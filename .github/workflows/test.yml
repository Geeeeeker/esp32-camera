name: Build examples

on:
  push:
    branches:
      - master
  pull_request:

  workflow_dispatch:
    inputs:
      idf_ver:
        description: 'ESP-IDF Version'
        required: true
        type: choice
        default: 'latest'
        options:
          - release-v5.1
          - release-v5.2
          - release-v5.3
          - release-v5.4
          - release-v5.5
          - release-v6.0
          - latest
      idf_target:
        description: 'ESP32 Target Board'
        required: true
        type: choice
        default: 'esp32'
        options:
          - esp32
          - esp32s2
          - esp32s3
          - esp32c2
          - esp32c3
      camera_model:
        description: 'Camera Model'
        required: true
        type: choice
        default: 'OV2640'
        options:
          - OV2640
          - OV3660
          - OV5640
          - OV7670
          - OV7725
          - NT99141
          - GC032A
          - GC0308
          - GC2145
          - BF3005
          - BF20A6
          - SC101IOT
          - SC030IOT
          - SC031GS
          - HM0360
          - HM1055
      custom_pins:
        description: 'Custom GPIO pins (format: KEY=VAL,KEY2=VAL2)'
        required: false
        type: string
        default: ''
        # 示例：PIN_PWDN=-1,PIN_RESET=15,PIN_XCLK=10,PIN_SIOD=4,PIN_SIOC=5,PIN_D7=9,PIN_D6=8,PIN_D5=7,PIN_D4=6,PIN_D3=3,PIN_D2=2,PIN_VSYNC=42,PIN_HREF=41,PIN_PCLK=40

jobs:
  build-examples:
    name: Build for ${{ matrix.idf_target }} on ${{ matrix.idf_ver }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # IDF 版本矩阵：手动触发时单值，自动触发时全量
        idf_ver: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.idf_ver) || '["release-v5.1", "release-v5.2", "release-v5.3", "release-v5.4", "release-v5.5", "release-v6.0", "latest"]') }}
        
        # 开发板矩阵：手动触发时单值，自动触发时全量
        idf_target: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.idf_target) || '["esp32", "esp32s2", "esp32s3", "esp32c2", "esp32c3"]') }}
        
        # 摄像头型号矩阵：手动触发时单值，自动触发时固定为 OV2640
        camera_model: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.camera_model) || '["OV2640"]') }}
        
        # 排除已知不兼容的组合（仅影响自动全量构建，手动触发时若选择此组合也会被跳过，符合预期）
        exclude:
          - idf_ver: "release-v5.1"
            idf_target: "esp32c2"
          - idf_ver: "release-v5.2"
            idf_target: "esp32c2"

    container: espressif/idf:${{ matrix.idf_ver }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Build with ESP-IDF
        env:
          IDF_TARGET: ${{ matrix.idf_target }}
          CAMERA_MODEL: ${{ matrix.camera_model }}
          CUSTOM_PINS: ${{ github.event.inputs.custom_pins }}
        shell: bash
        working-directory: examples/camera_example
        run: |
          . ${IDF_PATH}/export.sh
          
          # 设置严格编译警告
          export PEDANTIC_FLAGS="-DIDF_CI_BUILD -Werror -Werror=deprecated-declarations -Werror=unused-variable -Werror=unused-but-set-variable -Werror=unused-function"
          export EXTRA_CFLAGS="${PEDANTIC_FLAGS} -Wstrict-prototypes"
          export EXTRA_CXXFLAGS="${PEDANTIC_FLAGS}"
          
          # 启用指定摄像头型号的驱动支持
          echo "CONFIG_${CAMERA_MODEL}_SUPPORT=y" >> sdkconfig.defaults
          
          # 如果提供了自定义引脚配置，则解析并写入
          if [[ -n "$CUSTOM_PINS" ]]; then
            echo "Applying custom GPIO pins: $CUSTOM_PINS"
            IFS=',' read -ra PAIRS <<< "$CUSTOM_PINS"
            for pair in "${PAIRS[@]}"; do
              key=$(echo "$pair" | cut -d'=' -f1)
              val=$(echo "$pair" | cut -d'=' -f2)
              echo "CONFIG_${key}=${val}" >> sdkconfig.defaults
            done
          fi
          
          # 执行构建
          idf.py build
