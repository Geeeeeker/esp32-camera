name: Build examples

on:
  push:
    branches:
      - master
  pull_request:

  workflow_dispatch:
    inputs:
      # 新增：选择 IDF 版本
      idf_ver:
        description: 'Select ESP-IDF Version'
        required: true
        type: choice
        default: 'latest'
        options:
          - release-v5.1
          - release-v5.2
          - release-v5.3
          - release-v5.4
          - release-v5.5
          - release-v6.0
          - latest
      # 选择开发板型号
      idf_target:
        description: 'Select ESP32 Target Board'
        required: true
        type: choice
        default: 'esp32'
        options:
          - esp32
          - esp32s2
          - esp32s3
          - esp32c2
          - esp32c3
      # 选择摄像头型号
      camera_model:
        description: 'Select Camera Model'
        required: true
        type: choice
        default: 'OV2640'
        options:
          - OV2640
          - OV3660
          - OV5640
          - OV7670
          - OV7725
          - NT99141
          - GC032A
          - GC0308
          - GC2145
          - BF3005
          - BF20A6
          - SC101IOT
          - SC030IOT
          - SC031GS
          - HM0360
          - HM1055

jobs:
  build-examples:
    name: Build for ${{ matrix.idf_target }} on ${{ matrix.idf_ver }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # IDF 版本：手动触发时使用用户选择的值，自动触发时使用全矩阵
        idf_ver: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.idf_ver) || '["release-v5.1", "release-v5.2", "release-v5.3", "release-v5.4", "release-v5.5", "release-v6.0", "latest"]') }}
        
        # 开发板型号：手动触发时使用用户选择的值，自动触发时使用全矩阵
        idf_target: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.idf_target) || '["esp32", "esp32s2", "esp32s3", "esp32c2", "esp32c3"]') }}
        
        # 摄像头型号：手动触发时使用用户选择的值，自动触发时固定为 OV2640
        camera_model: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', github.event.inputs.camera_model) || '["OV2640"]') }}
        
        # 排除不兼容的组合（仅在自动全量构建时生效）
        exclude:
          - idf_ver: "release-v5.1"
            idf_target: "esp32c2"
          - idf_ver: "release-v5.2"
            idf_target: "esp32c2"

    container: espressif/idf:${{ matrix.idf_ver }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Build with ESP-IDF
        env:
          IDF_TARGET: ${{ matrix.idf_target }}
          CAMERA_MODEL: ${{ matrix.camera_model }}
        shell: bash
        working-directory: examples/camera_example
        run: |
          . ${IDF_PATH}/export.sh
          
          export PEDANTIC_FLAGS="-DIDF_CI_BUILD -Werror -Werror=deprecated-declarations -Werror=unused-variable -Werror=unused-but-set-variable -Werror=unused-function"
          export EXTRA_CFLAGS="${PEDANTIC_FLAGS} -Wstrict-prototypes"
          export EXTRA_CXXFLAGS="${PEDANTIC_FLAGS}"
          
          echo "CONFIG_${CAMERA_MODEL}_SUPPORT=y" >> sdkconfig.defaults
          
          idf.py build
